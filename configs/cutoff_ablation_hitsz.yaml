# Cutoff ablation sweeps for HITSZ-VCM
# Sweeps spatial_cutoff_fs to measure its impact on performance.

data:
  root: ./data/hitsz_vcm
  batch_size: 16
  num_workers: 4
  seq_len: 6
  img_size: [288, 144]

sampling:
  num_ids: 4
  clips_per_id: 4

model:
  name: sthf_fixed
  backbone: resnet50
  feature_dim: 2048
  num_classes: 100
  temporal_cutoff_ft: 2

sweep:
  spatial_cutoff_fs: [2, 5, 10, 15, 20]

loss:
  lambda_id: 1.0
  lambda_tri: 1.0
  lambda_int_id: 1.0
  lambda_int_tri: 1.0

train:
  epochs: 60
  lr: 0.00035
  optimizer: adam
  scheduler: cosine
  weight_decay: 0.0005
  milestones: [30, 50]
