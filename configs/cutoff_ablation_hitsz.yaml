# Cutoff ablation for HITSZ-VCM
# Runs each ablation variant through training and evaluation.

data:
  root: ./data/hitsz_vcm
  batch_size: 16
  num_workers: 4
  seq_len: 6
  img_size: [288, 144]

sampling:
  num_ids: 4
  clips_per_id: 4

model:
  name: cutoff_ablation
  backbone: resnet50
  feature_dim: 2048
  num_classes: 500

sweep:
  variants:
    - name: weak
      sthpf_type: fixed
      fs: 5
      ft: 1
    - name: paper
      sthpf_type: fixed
      fs: 10
      ft: 2
    - name: strong
      sthpf_type: fixed
      fs: 15
      ft: 2
    - name: adaptive
      sthpf_type: adaptive

loss:
  lambda_id: 1.0
  lambda_tri: 1.0
  lambda_int_id: 1.0
  lambda_int_tri: 1.0

train:
  epochs: 150
  lr: 0.00035
  optimizer: adam
  scheduler: cosine
  weight_decay: 0.0005
  save_dir: experiments/hitsz_cutoff_ablation
