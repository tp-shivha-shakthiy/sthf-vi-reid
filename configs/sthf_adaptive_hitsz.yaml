# ST-HF with adaptive cutoff configuration for HITSZ-VCM
# The network learns spatial/temporal cutoff frequencies during training.

data:
  root: ./data/hitsz_vcm
  batch_size: 16
  num_workers: 4
  seq_len: 6
  img_size: [288, 144]

sampling:
  num_ids: 4
  clips_per_id: 4

model:
  name: sthf_adaptive
  backbone: resnet50
  feature_dim: 2048
  num_classes: 500
  sthf_mode: adaptive
  sthpf:
    type: adaptive
  adaptive_sthpf:
    enabled: true
    branches:
      weak:
        fs: 5
        ft: 1
      paper:
        fs: 10
        ft: 2
      strong:
        fs: 15
        ft: 2

loss:
  lambda_id: 1.0
  lambda_tri: 1.0
  lambda_int_id: 1.0
  lambda_int_tri: 1.0

augmentation:
  caj:
    enabled: true
    alpha: 1.0
    prob: 0.5

train:
  epochs: 200
  lr: 0.00035
  optimizer: adam
  scheduler: cosine
  weight_decay: 0.0005
  save_dir: experiments/hitsz_sthf_adaptive
