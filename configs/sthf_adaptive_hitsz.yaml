# ST-HF with adaptive cutoff configuration for HITSZ-VCM
# The network learns spatial/temporal cutoff frequencies during training.

data:
  root: ./data/hitsz_vcm
  batch_size: 16
  num_workers: 4
  seq_len: 6
  img_size: [288, 144]

sampling:
  num_ids: 4
  clips_per_id: 4

model:
  name: sthf_adaptive
  backbone: resnet50
  feature_dim: 2048
  num_classes: 100
  sthf_mode: adaptive

loss:
  lambda_id: 1.0
  lambda_tri: 1.0
  lambda_int_id: 1.0
  lambda_int_tri: 1.0

train:
  epochs: 60
  lr: 0.00035
  optimizer: adam
  scheduler: cosine
  weight_decay: 0.0005
  milestones: [30, 50]
