# ST-HF with fixed cutoff configuration for HITSZ-VCM
# Reproduces the paper's ST-HF fixed-cutoff settings.

data:
  root: ./data/hitsz_vcm
  batch_size: 16
  num_workers: 4
  seq_len: 6
  img_size: [288, 144]

sampling:
  num_ids: 4
  clips_per_id: 4

model:
  name: sthf_fixed
  backbone: resnet50
  feature_dim: 2048
  num_classes: 500
  sthf_cutoff: 0.5
  sthpf:
    type: fixed
    fs: 10
    ft: 2

loss:
  lambda_id: 1.0
  lambda_tri: 1.0
  lambda_int_id: 1.0
  lambda_int_tri: 1.0

train:
  epochs: 200
  lr: 0.00035
  optimizer: adam
  scheduler: cosine
  weight_decay: 0.0005
  save_dir: experiments/hitsz_sthf_fixed
