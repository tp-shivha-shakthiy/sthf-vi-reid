# ST-HF with fixed cutoff configuration for HITSZ-VCM
data:
  root: ./data/hitsz_vcm
  batch_size: 32
  num_workers: 4
  seq_len: 8
  img_size: [224, 224]

model:
  name: sthf_fixed
  backbone: resnet50
  feature_dim: 2048
  num_classes: 100
  sthf_cutoff: 0.5

dataset:
  sequence_length: 6
  image_size: [288, 144]

train:
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0005
  milestones: [30, 50]
